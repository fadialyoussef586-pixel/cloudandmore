# اختبار محلي — يتطلب PostgreSQL (أو استخدم DATABASE_URL من Render)
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - postgres
    environment:
      PORT: 80
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: titan_db
      DB_USER: postgres
      DB_PASS: titan_pass
      DB_SSLMODE: disable

  postgres:
    image: postgres:16-alpine
    container_name: titan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: titan_pass
      POSTGRES_DB: titan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
