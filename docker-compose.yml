# اختبار محلي — نفس صورة Render (MySQL + Apache في حاوية واحدة)
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PORT: 80
      MYSQL_ROOT_PASSWORD: titan_root_pass
      DB_NAME: titan_db
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: titan_root_pass
