services:
  mysql:
    image: mysql:8.0
    container_name: titan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: titan_root_pass
      MYSQL_DATABASE: titan_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptitan_root_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: titan_db
      DB_USER: root
      DB_PASS: titan_root_pass

volumes:
  mysql_data:
