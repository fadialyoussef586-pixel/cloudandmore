services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PORT: 80
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: titan_db
      DB_USER: root
      DB_PASSWORD: titan_pass

  mysql:
    image: mysql:8.0
    container_name: titan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: titan_pass
      MYSQL_DATABASE: titan_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
